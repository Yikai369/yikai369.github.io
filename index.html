<script>

  var timeline = [];


  // Firebase database init 
  const firebaseConfig = {
    apiKey: "AIzaSyD68L-6y5ip5ebJYn6pcbz8Ges6eQJs4I4",
    authDomain: "ambiguity-bfd57.firebaseapp.com",

  // // Initialize Firebase

  // const auth = getAuth();

  //         const errorCode = error.code;

  firebase.initializeApp(firebaseConfig);

  // Initialize services
  const database = firebase.database();

  // Sign in anonymously
  auth.signInAnonymously().catch((error) => {

  /* init connection with pavlovia.org

  timeline.push(pavlovia_init); */

  /* create random subject ID and save it */
  var subject_id = jsPsych.randomization.randomID(8);
  const experiment_version = "ambiguity_naming_v2";

  jsPsych.data.addProperties({
    subject: subject_id,
    experiment_version: experiment_version
  });

  var images = imageNames

  /* preload images */
  var preload = {
    type: jsPsychPreload,
    images: images,
    show_detailed_errors: true,
    message: '<p>The experiment is loading. This may take a few minutes.</p>'
  };
  timeline.push(preload);

  /*create browser check for mobile phone*/
  var phonecheck = {
    type: jsPsychBrowserCheck,
    inclusion_function: (data) => {
      return data.mobile === false
    },
    exclusion_message: (data) => {
      if (data.mobile) {
        return '<p>You must use a desktop/laptop computer to participate in this experiment.</p>';
      }
    }
  };

  /*create browser check for screen width*/
  var widthcheck = {
    type: jsPsychBrowserCheck,
    minimum_width: 800,
    minimum_height: 600
  };

  /* Define welcome message trial */
  var welcome = {
    type: jsPsychHtmlButtonResponse,
    choices: ["Continue"],
    stimulus: "<p><strong>Welcome!</strong></p>" +
      "<p>The experiment will be described in the consent form on the following page. Once consent is given, the experiment will begin.</p>" +
      "<p><strong>Please do not close the tab/window until the experiment is complete.</strong></p>" +
      "<div style='width: 700px;'>",
      data: {
      task: 'welcome'
    }
  };
  timeline.push(welcome);

  /* consent form */
  var consent = {
    type: jsPsychFullscreen,
    fullscreen_mode: true,
    button_label: ["I agree"],
    message: "<div style='word-wrap: break-word; width: 900px'><h3>Letter of Information and Informed Consent</h3><h4>Please consider this information carefully before deciding whether to participate in this research</h4>" +
      "<ul style='text-align: left; list-style-type:none;'><li>We are delighted to invite you to participate in the online research study outlined below. Your participation is voluntary, and you can withdraw from the study at any time. </li>" +
      "<li><b>Purpose of the experiment</b>: The purpose of this experiment is to learn more about how people process complex visual information from natural environments. You will be fully debriefed on the rationale underlying this experiment upon completion. </li>" +
      "<li><b>What you will be doing:</b> You will make judgements based on the stimuli or answer questions, as instructed to you on the computer screen. </li>" +
      "<li><b>Time commitment & compensation:</b> This experiment takes approximately 25-30 minutes to complete. You will receive X dollars for your participation.</li>" +
      "<li><b>Risk & Benefits:</b> There are no risks to you participating in this experiment. Your biggest benefit will be knowledge. At the end of the experiment, we'll explain all of the ideas that went into making this study and provide some additional readings related to the study. If you're interested, let us know and we will send you a copy of what we write about this experiment when we're done. Send us an email at (bwlab.experiments@gmail.com) for more information. </li>" +
      "<li><b>Confidentiality, Participation and Withdrawal:</b> No one will know that you participated in this experiment and the data that you produce from this experiment will never have your name attached to it. Everything that happens in this experiment will stay completely confidential. Ultimately, we aim to present the results of this experiment at conferences and publish them in a journal, magazine, or newspaper. If we do, you will never be mentioned. Should you decide to withdraw from this experiment, you will still receive course credit." +
      "<li><b>Contact:</b> If you have any questions about this experiment, you may email us at bwlab.experiments@gmail.com. If you have any questions about your rights as a participant, you may contact the Office of Research Ethics at ethics.review@utoronto.ca or 416-946-3273. Please note that you may also save a copy of this consent form for future reference. </li></ul>" +
      "<p><b>I have read and understood the above information. I agree to participate.</b></p>" +
      "<p>Please consent by clicking the button below to continue. Otherwise, please exit the study at this time.</p></div>",
    data: {
      task: 'consent'
    }
  };
  timeline.push(consent);

  /* Define instructions trial */
  var instructions = {
    type: jsPsychHtmlButtonResponse,
    choices: ["Continue"],
    stimulus: "<p>In this experiment, images will appear in the center of the screen.</p>" +
      "<p>For each image, press the SPACE bar as soon as a category/name comes to mind.</p>" +
      "<p>After that, you will type the category name and then complete several slider ratings.</p>" +
      "<p>The task includes a short practice block before the main trials.</p>"+
      "<div style='width: 700px;'>",
      data: {
      task: 'instructions'
    }
  };
  timeline.push(instructions);

  /* Ambiguity instructions */
  var ambiguity_instructions = {
    type: jsPsychHtmlButtonResponse,
    choices: ["Start"],
    stimulus:
      "<p><strong>Per trial sequence:</strong></p>" +
      "<p>1) View image and press SPACE when a category comes to mind.</p>" +
      "<p>2) Type the category name.</p>" +
      "<p>3) Rate pleasure, ambiguity, and naming confidence.</p>" +
      "<p>If no name comes to mind quickly, the image will continue automatically.</p>" +
      "<p>If you are ready, click 'Start'.</p>" +
      "<div style='width: 700px;'>",
    post_trial_gap: 1000,
    data: {
      task: 'instructions'
    }
  };
  timeline.push(ambiguity_instructions);

  /* define fixation and test trial */
  var fixation = {
    type: jsPsychHtmlKeyboardResponse,
    stimulus: '<div style="font-size:60px;">+</div>',
    choices: "NO_KEYS",
    trial_duration: 250,
    data: {
      task: 'fixation'
    }
  };

  function normalizeStimulusName(stimulusPath) {
    return String(stimulusPath || "")
      .replace(/^all_presented_images\//, "")
      .replace(/\.[^/.]+$/, "")
      .replace(/[^A-Za-z0-9_-]/g, "_");
  }

  var main_trial_counter = 0;
  var practice_trial_counter = 0;
  var current_trial_context = {
    trial_uid: null,
    stimulus: null,
    phase: null,
    trial_index: null
  };

  function setCurrentTrialContext(stimulus, phase) {
    if (phase === "practice") {
      practice_trial_counter += 1;
      current_trial_context.trial_index = practice_trial_counter;
    } else {
      main_trial_counter += 1;
      current_trial_context.trial_index = main_trial_counter;
    }
    current_trial_context.stimulus = stimulus;
    current_trial_context.phase = phase;
    current_trial_context.trial_uid =
      subject_id + "_" + phase + "_" + current_trial_context.trial_index + "_" + normalizeStimulusName(stimulus);
  }

  function ratingLabels(leftAnchor, rightAnchor) {
    return [leftAnchor, "", "", "", "", "", rightAnchor];
  }

  function createNamingOnsetTrial(phase) {
    return {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: function () {
        var stim = jsPsych.timelineVariable("stimulus");
        return (
          "<div><img src='" + stim + "' style='max-height:375px; width:auto;'></div>" +
          "<p><strong>Press SPACE as soon as a category/name comes to mind.</strong></p>"
        );
      },
      choices: [" "],
      response_ends_trial: true,
      trial_duration: 5000,
      on_start: function () {
        var stim = jsPsych.timelineVariable("stimulus");
        setCurrentTrialContext(stim, phase);
      },
      on_finish: function (data) {
        data.task = "naming_onset";
        data.phase = phase;
        data.stimulus = current_trial_context.stimulus;
        data.trial_uid = current_trial_context.trial_uid;
        data.trial_index = current_trial_context.trial_index;
        data.naming_onset_rt_ms = data.rt;
        data.naming_onset_key = data.response;
        data.naming_onset_missed = data.response === null;
        data.flag_rt_too_fast = data.rt !== null && data.rt < 150;
        data.flag_no_naming_response = data.naming_onset_missed;
      }
    };
  }

  function createCategoryInputTrial(phase) {
    return {
      type: jsPsychSurveyHtmlForm,
      html: "<p>Type the category/name that best matches the image:</p>" +
        "<p><input type='text' id='category_label' name='category_label' required style='width:500px;'></p>",
      button_label: "Continue",
      on_finish: function (data) {
        var responseObj = typeof data.response === "string" ? JSON.parse(data.response) : data.response;
        var rawLabel = responseObj && responseObj.category_label ? String(responseObj.category_label) : "";
        var trimmedLabel = rawLabel.trim();
        data.task = "category_input";
        data.phase = phase;
        data.stimulus = current_trial_context.stimulus;
        data.trial_uid = current_trial_context.trial_uid;
        data.trial_index = current_trial_context.trial_index;
        data.typed_category_label_raw = rawLabel;
        data.typed_category_label_trimmed = trimmedLabel;
        data.typed_label_empty_attempts = trimmedLabel.length === 0 ? 1 : 0;
        data.flag_label_too_short = trimmedLabel.length > 0 && trimmedLabel.length < 2;
        data.flag_empty_label_attempts = data.typed_label_empty_attempts > 0;
      }
    };
  }

  function createRatingTrial(phase, taskName, promptText, leftAnchor, rightAnchor) {
    return {
      type: jsPsychImageSliderResponse,
      stimulus: function () {
        return current_trial_context.stimulus;
      },
      stimulus_height: 375,
      min: 1,
      max: 7,
      slider_start: 4,
      slider_width: 700,
      require_movement: true,
      labels: ratingLabels(leftAnchor, rightAnchor),
      prompt: promptText,
      on_finish: function (data) {
        data.task = taskName;
        data.phase = phase;
        data.stimulus = current_trial_context.stimulus;
        data.trial_uid = current_trial_context.trial_uid;
        data.trial_index = current_trial_context.trial_index;
      }
    };
  }

  function createRatingConfidenceTrial(phase) {
    return {
      type: jsPsychImageSliderResponse,
      stimulus: function () {
        return current_trial_context.stimulus;
      },
      stimulus_height: 375,
      min: 1,
      max: 7,
      slider_start: 4,
      slider_width: 700,
      require_movement: true,
      labels: ratingLabels("Not confident at all", "Very confident"),
      prompt: "<p>How confident are you in the category name you provided?</p>",
      on_finish: function (data) {
        var recentRatings = jsPsych.data.get().last(2).values();
        var straightline = false;
        if (recentRatings.length === 2) {
          straightline = recentRatings[0].response === recentRatings[1].response &&
            recentRatings[0].response === data.response;
        }
        data.task = "rating_confidence";
        data.phase = phase;
        data.stimulus = current_trial_context.stimulus;
        data.trial_uid = current_trial_context.trial_uid;
        data.trial_index = current_trial_context.trial_index;
        data.flag_straightline_ratings = straightline;
      }
    };
  }


  // Function to randomly pick a chunk
  function getRandomChunk() {
  // const randomIndex = Math.floor(Math.random() * chunkList.length);
  const randomIndex = 0;
  // const randomIndex = 2
  return [chunkList[randomIndex], randomIndex]; // Directly return the random chunk
  }
  const [test_stimuli, chunk_index] = getRandomChunk();
  const practice_stimuli = images.slice(0, 2).map(function (img) {
    return { stimulus: img };
  });
  console.log(test_stimuli.length, chunk_index)
  
  jsPsych.data.addProperties({
    chunk_ixs: chunk_index
  });


  var naming_onset_practice = createNamingOnsetTrial("practice");
  var category_input_practice = createCategoryInputTrial("practice");
  var rating_pleasure_practice = createRatingTrial(
    "practice",
    "rating_pleasure",
    "<p>How <strong>pleasant</strong> is this image?</p>",
    "Very unpleasant",
    "Very pleasant"
  );
  var rating_ambiguity_practice = createRatingTrial(
    "practice",
    "rating_ambiguity",
    "<p>How <strong>ambiguous</strong> is this image?</p>",
    "Not at all ambiguous",
    "Very ambiguous"
  );
  var rating_confidence_practice = createRatingConfidenceTrial("practice");

  var practice_feedback = {
    type: jsPsychHtmlButtonResponse,
    choices: ["Continue"],
    stimulus: function () {
      var trialUid = current_trial_context.trial_uid;
      var trialRows = jsPsych.data.get().filter({ trial_uid: trialUid }).values();
      var onsetRow = trialRows.find(function (row) { return row.task === "naming_onset"; });
      var labelRow = trialRows.find(function (row) { return row.task === "category_input"; });
      var nameStatus = onsetRow && !onsetRow.naming_onset_missed ? "captured" : "not captured (timed out)";
      var typedStatus = labelRow && labelRow.typed_category_label_trimmed ? "accepted" : "missing";
      return "<p><strong>Practice feedback</strong></p>" +
        "<p>SPACE response: " + nameStatus + ".</p>" +
        "<p>Typed category: " + typedStatus + ".</p>" +
        "<p>Remember to respond in all steps on each trial.</p>";
    },
    data: {
      task: "practice_feedback",
      phase: "practice"
    }
  };

  var practice_procedure = {
    timeline: [
      fixation,
      naming_onset_practice,
      category_input_practice,
      rating_pleasure_practice,
      rating_ambiguity_practice,
      rating_confidence_practice,
      practice_feedback
    ],
    timeline_variables: practice_stimuli,
    randomize_order: false
  };

  var naming_onset_main = createNamingOnsetTrial("main");
  var category_input_main = createCategoryInputTrial("main");
  var rating_pleasure_main = createRatingTrial(
    "main",
    "rating_pleasure",
    "<p>How <strong>pleasant</strong> is this image?</p>",
    "Very unpleasant",
    "Very pleasant"
  );
  var rating_ambiguity_main = createRatingTrial(
    "main",
    "rating_ambiguity",
    "<p>How <strong>ambiguous</strong> is this image?</p>",
    "Not at all ambiguous",
    "Very ambiguous"
  );
  var rating_confidence_main = createRatingConfidenceTrial("main");

  /* define test procedure */
  var test_procedure_main = {
    timeline: [
      fixation,
      naming_onset_main,
      category_input_main,
      rating_pleasure_main,
      rating_ambiguity_main,
      rating_confidence_main
    ],
    timeline_variables: test_stimuli,
    randomize_order: true
  };


  // /* define break */
  // var break_instructions = {
  //   type: jsPsychHtmlButtonResponse,
  //   choices: ["Continue"],
  //   stimulus: "<p> You may now take a short break. </p>" +
  //     "<p> Click on the 'Continue' button when you are ready to proceed to the next session.</p>" +
  //     "<div style='width: 700px;'>",
  //     data: {
  //     task: 'instructions'
  //   }
  // };



  var overall_procedure = {
    timeline: [
      practice_procedure,
      test_procedure_main, 
      // break_instructions, 
      // spacecurv_instructions, 
      // test_procedure_spacecurv, 
      // break_instructions, 
      // furniturecurv_instructions, 
      // test_procedure_furniturecurv
    ]
  };
  timeline.push(overall_procedure);



  /* end of experiment message */
  var exp_end = {
    type: jsPsychHtmlButtonResponse,
    choices: ["Continue"],
    stimulus: "<p>The experiment is now completed!</p>" +
      "<p>Please continue with the remaining questions and do not close the tab/window until instructed.</p>" +
      "<div style='width: 700px;'>",
      data: {
      task: 'instructions'
    }
  };
  timeline.push(exp_end);

  /* define demographics */
  var demographics = {
    type: jsPsychSurveyHtmlForm,
    html: "<div style='word-wrap: break-word; width: 900px'><h3>Demographic info</h3><p><label for='SONA number'>Prolific ID: </label><input type='text' id='SONA' name='SONA' required size='10'></p><p><label for='gender'>Gender: </label><input type='text' id='gender' name='gender' required size='10'></p><p><label for='age'>Age: </label><input type='text' id='age' name='age' required size='10'></p><p><label for='mother tongue'>Mother tongue: </label><input type='text' id='mother tongue' name='mother tongue' required size='10'></p><p><label for='ethnicity'>Ethnicity: </label><input type='text' id='ethnicity' name='ethnicity' required size='10'></p><p>Do you have any formal visual arts/design/architecture training? </p><p><input type='radio' id='yestraining' name='training' value='yes' required><label for='yestraining'> Yes </label><input type='radio' id='notraining' name='training' value='no'><label for='noarttraining'> No </label></p><p><label for='trainingyears'>If yes, what type of training and how many years of training do you have? </label><input type='text' id='trainingyears' name='trainingyears' size='10'></p></div>",
    data: {
      task: 'demographics'
    }
  };
  timeline.push(demographics);

  /* define debrief */
  var debrief_block = {
    type: jsPsychHtmlButtonResponse,
    choices: ["End"],
    stimulus: "<p>You have reached the end of the experiment.</p>" +
      "<p>The aim of our experiment was to collect ambiguity ratings for subsequent analysis of the relationship between ambiguity and aesthetic pleasure.</p>" +
      "<p>The experiment results will be used for a student research project and may be used for future academic publications. As a reminder, all results will be kept anonymous.</p>" +
      "<p>Thank you for participating!</p>" +
      "<div style='width: 900px';>",
    data: {
      task: 'debrief'
    }
  };
  timeline.push(debrief_block);


  /*exit fullscreen */
  var exit_fullscreen = {
    type: jsPsychFullscreen,
    fullscreen_mode: false,
    delay_after: 0
  };
  timeline.push(exit_fullscreen);

   /* finish connection with pavlovia.org 
  var pavlovia_finish = {
    type: jsPsychPavlovia,
    command: "finish",
    participantId: String(subject_id),
    //completedCallback: function(){alert('Data successfully submitted!');}
    };
  timeline.push(pavlovia_finish); */

  // var save_data = {
  //   type: jsPsychHtmlKeyboardResponse ,
  //   stimulus: "<p> Saving data, please stay at this page and wait for further instructions.</p> ",
  //   post_trial_gap: 2000,
  //   choices: null,
  //   trial_duration: 2000,
  //   on_finish: function () {
  //       //firebase!
  //       var tmp = new Uint32Array(1);
  //       tmp = window.crypto.getRandomValues(tmp);
  //       var dbpath = auth.currentUser.uid + '/' + tmp;
  //       set(ref(database, dbpath), {
  //           data: jsPsych.data.get().values(),
  //           study: 'ambiguity_rating',
  //           date: Date()
  //       });
  //   }
  // };

  var save_data = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: "<p>Saving data, please stay at this page and wait for further instructions.</p>",
      post_trial_gap: 2000,
      choices: null,
      trial_duration: 2000,
      on_finish: function () {
        // Firebase reference and data saving
        var tmp = new Uint32Array(1);
        tmp = window.crypto.getRandomValues(tmp);
        var dbpath = auth.currentUser.uid + '/' + tmp[0]; // Use first element of Uint32Array
        var dataPayload = jsPsych.data.get().values();

        // Save data to Firebase database
        firebase.database().ref(dbpath).set({
          data: dataPayload,
          study: 'ambiguity_rating_naming_v2',
          date: new Date().toISOString() // Save date in ISO format
        })
        .then(() => {
          console.log("Data saved successfully.");
        })
        .catch((error) => {
          console.error("Error saving data:", error);
          alert("Data save failed. Please do not close this page and contact the researcher.");
        });
      }
    };
  timeline.push(save_data)

  /* define exit */
  // var exit_block = {
  //   type: jsPsychHtmlKeyboardResponse,
  //   stimulus: 'You may now exit the page.'
  // };
  // timeline.push(exit_block);

  var exit_block = {
  type: jsPsychHtmlKeyboardResponse,
  stimulus: `<p>You've finished the last task. Thanks for participating!</p>
    <p><a href="https://app.prolific.co/submissions/complete?cc=XXXXXXX">Click here to return to Prolific and complete the study</a>.</p>`,
  choices: "NO_KEYS"
  }
  timeline.push(exit_block);

  /* start the experiment */
  jsPsych.run(timeline);



</script>
